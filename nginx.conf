http {

    include mime.types;

    server {
        listen 80;
        listen [::]:80;

        # server_name localhost;

        location / {
            root /Home/pratham/app/openplayer/client/dist;
            try_files $uri $uri/ /index.html;
        }


        location /api/ {
            proxy_pass http://localhost:3001;
        }


    }
}

events {}